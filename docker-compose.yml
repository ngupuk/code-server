version: "3"

services:
  vscode-tunnel:
    build:
      context: .
      args:
        # USERNAME: Non-root user name (default: vscode)
        - USERNAME=vscode
        # USER_UID: User ID (default: 1000) - match with your host user if needed
        - USER_UID=1000
        # USER_GID: Group ID (default: 1000) - match with your host user if needed
        - USER_GID=1000

    user: "1000:1000"

    environment:
      # TUNNEL_NAME: The name for your VS Code tunnel (default: vscode-tunnel)
      - TUNNEL_NAME=my-dev-server

    volumes:
      # Workspace volume for persistent code
      - ./workspace:/workspace
      # VS Code CLI data volume - persists tunnel credentials and settings
      - vscode_data:/home/vscode/.local/share/code-cli
      # VS Code config volume - persists extensions and settings
      - vscode_config:/home/vscode/.config/code-server
      # Home directory volume - persists shell history and other user data
      - vscode_home:/home/vscode
      # Docker socket - allows running Docker commands inside container
      # WARNING: This grants the container user root-level access to the host system.
      # Only use with trusted code. See README for security considerations.
      - /var/run/docker.sock:/var/run/docker.sock

    restart: unless-stopped

# Named volumes for data persistence
volumes:
  vscode_data:
    driver: local
  vscode_config:
    driver: local
  vscode_home:
    driver: local
